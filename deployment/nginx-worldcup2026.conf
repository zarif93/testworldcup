# Nginx reverse proxy – Ubuntu 24.04
# App listens on localhost:3000 (or PORT from .env.production).
# Install: sudo cp deployment/nginx-worldcup2026.conf /etc/nginx/sites-available/worldcup2026
# Enable:  sudo ln -sf /etc/nginx/sites-available/worldcup2026 /etc/nginx/sites-enabled/
# Test:    sudo nginx -t && sudo systemctl reload nginx
# Production domain: megatoto.net (and optionally www.megatoto.net).

# Port must match PORT in .env.production (default 3000)
upstream worldcup2026_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name megatoto.net www.megatoto.net;

    # Allow image uploads (multipart). Must be large enough or 413 will return HTML before app.
    client_max_body_size 50m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    location / {
        proxy_pass http://worldcup2026_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
