# Nginx reverse proxy – Ubuntu 24.04
# Place in: /etc/nginx/sites-available/worldcup2026
# Enable: sudo ln -sf /etc/nginx/sites-available/worldcup2026 /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
# Production domain: megatoto.net (and optionally www.megatoto.net). Use default_server only if needed.

server {
    listen 80;
    server_name megatoto.net www.megatoto.net;
    # default_server;  # uncomment to use as default for port 80

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
