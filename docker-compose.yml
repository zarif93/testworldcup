version: "3.9"

services:
  app:
    build: .
    container_name: worldcup2026-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # ניתן להגדיר כאן משתני סביבה נוספים או להשתמש ב-.env
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data

