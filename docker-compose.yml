version: "3.9"

services:
  app:
    build: .
    container_name: worldcup2026-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      # הגדר JWT_SECRET ב-.env או כאן (חובה לפרודקשן אמיתי)
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data

